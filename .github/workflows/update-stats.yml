name: Update GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch streak stats SVG
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          curl -s "https://github-readme-streak-stats-eight.vercel.app/?user=gloooomed&theme=dark&hide_border=false" \
            -H "Authorization: token $GH_TOKEN" \
            -o assets/streak.svg
          head -1 assets/streak.svg | grep -q "<svg" && echo "streak.svg OK" || (
            echo "streak failed, trying demolab..."
            curl -s "https://streak-stats.demolab.com/?user=gloooomed&theme=dark&hide_border=false" \
              -o assets/streak.svg
          )

      - name: Fetch top langs SVG
        run: |
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=gloooomed&hide_border=false&include_all_commits=true&count_private=true&layout=compact&theme=dark&cache_seconds=1800" \
            -o assets/top-langs.svg
          if ! head -1 assets/top-langs.svg | grep -q "<svg"; then
            echo "Primary source failed, trying mirror..."
            curl -s "https://github-readme-stats-eight.vercel.app/api/top-langs/?username=gloooomed&hide_border=false&include_all_commits=true&count_private=true&layout=compact&theme=dark" \
              -o assets/top-langs.svg
          fi
          head -1 assets/top-langs.svg | grep -q "<svg" && echo "top-langs.svg OK" || echo "WARNING: top-langs.svg invalid"

      - name: Commit updated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/streak.svg assets/top-langs.svg
          git diff --cached --quiet || git commit -m "chore: update github stats [skip ci]"
          git push
