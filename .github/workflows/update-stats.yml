name: Update GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  streak:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch streak SVG
        run: |
          curl -s "https://github-readme-streak-stats-eight.vercel.app/?user=gloooomed&theme=dark&hide_border=false" \
            -o assets/streak.svg
          head -1 assets/streak.svg | grep -q "<svg" && echo "OK" || echo "WARNING: invalid"

      - name: Commit streak SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/streak.svg
          git diff --cached --quiet || git commit -m "chore: update streak [skip ci]"
          git push

  top-langs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate top langs via lowlighter/metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: gloooomed
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          config_output: svg
          filename: assets/top-langs.svg
          config_display: column
          config_padding: 0
          config_animations: no

      - name: Commit top langs SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/top-langs.svg
          git diff --cached --quiet || git commit -m "chore: update top langs [skip ci]"
          git push
